<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>VaultBet Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* === YOUR FULL ORIGINAL CSS (unchanged) === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0c14;--bg2:#0f1020;--card:#161828;--card2:#1c1f35;--inp:#10111e;
  --b1:#1e2240;--b2:#272c4a;--b3:#333860;
  --tx:#dde1f5;--mu:#4a5070;--mu2:#6870a0;
  --green:#3ec45a;--gh:#5adf74;
  --gold:#f5a623;--goldh:#ffc85a;
  --red:#ef4444;--redh:#f87171;
  --blue:#6366f1;--blueh:#818cf8;
  --purple:#9333ea;--cyan:#22d3ee;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--tx);display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
/* NAV */
.nav{height:52px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:40}
.logo{font-size:16px;font-weight:900;letter-spacing:-1px;color:#fff;display:flex;align-items:center;gap:6px}
.logo-ico{width:26px;height:26px;background:linear-gradient(135deg,var(--green),#267a36);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.nav-links{display:flex;gap:1px;margin-left:4px}
.nl{padding:5px 10px;font-size:12px;font-weight:500;color:var(--mu2);cursor:pointer;border-radius:6px;border:none;background:none;transition:all .15s}
.nl:hover{background:var(--card);color:var(--tx)}
.nl.on{background:var(--card);color:var(--tx)}
.nav-gap{flex:1}
.bal-pill{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--b1);border-radius:8px;padding:5px 11px;cursor:pointer;transition:border-color .2s}
.bal-pill:hover{border-color:var(--gold)}
.bal-lbl{font-size:9px;color:var(--mu2);text-transform:uppercase;letter-spacing:.5px}
.bal-num{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--gold)}
.dep-btn{background:var(--green);color:#000;border:none;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap}
.dep-btn:hover{background:var(--gh)}
.ava{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer}
/* TICKER */
.ticker{height:28px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;overflow:hidden;flex-shrink:0}
.ticker-live{background:var(--green);color:#000;font-size:9px;font-weight:700;padding:0 9px;height:100%;display:flex;align-items:center;flex-shrink:0}
.ticker-scroll{overflow:hidden;flex:1;height:100%}
.ticker-inner{display:flex;align-items:center;white-space:nowrap;animation:scroll 35s linear infinite;height:100%}
.ti{display:flex;align-items:center;gap:5px;padding:0 14px;font-size:10px;height:100%;border-right:1px solid var(--b1)}
.ti-n{color:var(--mu2)}.ti-g{color:var(--tx)}
.ti-a{font-family:'Space Mono',monospace;font-weight:700}
.ti-a.w{color:var(--gh)}.ti-a.l{color:var(--redh)}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* BODY */
.body{display:flex;flex:1;min-height:0;overflow:hidden}
/* SIDEBAR */
.sb{width:50px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:1px;flex-shrink:0}
.sbi{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:background .15s;position:relative;flex-shrink:0}
.sbi:hover{background:var(--card2)}
.sbi.on{background:var(--card2)}
.sbi.on::before{content:'';position:absolute;left:-7px;top:25%;bottom:25%;width:3px;background:var(--green);border-radius:0 2px 2px 0}
.sb-sep{width:28px;height:1px;background:var(--b1);margin:3px 0;flex-shrink:0}
.sb-bot{margin-top:auto}
/* MAIN AREA */
.main{flex:1;display:flex;min-width:0;overflow:hidden}
/* GAME AREA */
.game-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
/* GAME TOPBAR */
.gtb{background:var(--bg2);border-bottom:1px solid var(--b1);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gtb-l{display:flex;align-items:center;gap:7px}
.back-btn{color:var(--mu2);font-size:11px;cursor:pointer;padding:4px 7px;border-radius:6px;border:none;background:none;transition:all .15s}
.back-btn:hover{background:var(--card);color:var(--tx)}
.game-title{font-size:13px;font-weight:700;color:#fff}
.live-badge{background:rgba(62,196,90,.15);border:1px solid rgba(62,196,90,.3);color:var(--gh);font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:flex;align-items:center;gap:3px}
.ld{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.3s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
/* GAME LAYOUT */
.gl{display:flex;flex:1;min-height:0;overflow:hidden}
/* BET PANEL */
.bp{width:240px;background:var(--card);border-right:1px solid var(--b1);padding:11px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex-shrink:0}
.bp-hd{display:flex;align-items:center;justify-content:space-between}
.bp-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mu2)}
.bp-bal{font-size:10px;color:var(--mu2);font-family:'Space Mono',monospace}
.bp-bal span{color:var(--gold)}
.bi-wrap{background:var(--inp);border:1.5px solid var(--b2);border-radius:8px;display:flex;align-items:center;overflow:hidden}
.bi-wrap:focus-within{border-color:var(--gold)}
.bi{flex:1;background:none;border:none;color:#fff;font-family:'Space Mono',monospace;font-size:13px;padding:8px 10px;outline:none}
.bi::placeholder{color:var(--mu)}
.bi-curr{color:var(--mu2);font-size:11px;padding:0 9px;font-weight:600}
.bq-row{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px}
.bq{background:var(--inp);border:none;border-radius:5px;padding:4px 2px;font-size:10px;font-weight:600;color:var(--mu2);cursor:pointer;text-align:center;transition:all .13s}
.bq:hover{background:var(--b2);color:var(--tx)}
.bp-lbl{font-size:10px;color:var(--mu2);margin-bottom:3px;display:block;font-weight:500}
.bp-sel{width:100%;background:var(--inp);border:1.5px solid var(--b2);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:12px;cursor:pointer;outline:none}
.mines-row{display:flex;align-items:center;gap:6px}
.mn-num{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--gold);min-width:18px;text-align:center}
.mn-arr{display:flex;flex-direction:column;gap:2px}
.mna{width:18px;height:15px;background:var(--inp);border:1px solid var(--b2);border-radius:4px;color:var(--tx);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .13s}
.mna:hover{background:var(--b2)}
.mn-pips{flex:1;display:flex;flex-wrap:wrap;gap:2px}
.pip{width:6px;height:4px;border-radius:1px;background:var(--b1)}
.pip.on{background:var(--red)}
.stat-box{background:var(--inp);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center}
.sb-l .sbl{font-size:9px;color:var(--mu2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.sb-l .sbv{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--gh)}
.sb-r{text-align:right}
.sb-r .sbl{font-size:9px;color:var(--mu2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.sb-r .sbv{font-family:'Space Mono',monospace;font-size:11px;color:var(--tx)}
.trio{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.tbox{background:var(--inp);border-radius:6px;padding:5px 4px;text-align:center}
.tl{font-size:8px;color:var(--mu2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.tv{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--tx)}
.gbtn{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Inter',sans-serif;transition:all .15s}
.gbtn.go{background:var(--green);color:#000}
.gbtn.go:hover{background:var(--gh)}
.gbtn.cash{background:var(--gold);color:#000;animation:gp 1.8s ease infinite}
.gbtn.cash:hover{background:var(--goldh)}
.gbtn:disabled{opacity:.3;cursor:not-allowed;animation:none}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,.35)}50%{box-shadow:0 0 0 7px rgba(245,166,35,0)}}
.dir-row{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ddir{padding:7px;border:1.5px solid var(--b2);border-radius:7px;background:var(--inp);color:var(--mu2);font-size:11px;font-weight:600;cursor:pointer;transition:all .14s;font-family:'Inter',sans-serif}
.ddir.on{border-color:var(--green);background:rgba(62,196,90,.08);color:var(--gh)}
.d-range{width:100%;appearance:none;height:4px;background:var(--b2);border-radius:2px;outline:none;cursor:pointer;margin:3px 0}
.d-range::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}
.ac-row{display:flex;align-items:center;gap:5px}
.ac-inp{flex:1;background:var(--inp);border:1.5px solid var(--b2);border-radius:8px;padding:8px 9px;color:#fff;font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
.ac-inp:focus{border-color:var(--gold)}
.ac-x{color:var(--mu2);font-size:12px;font-weight:700}
.profit-row{background:var(--inp);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;display:flex;justify-content:space-between}
.pr-l{font-size:10px;color:var(--mu2)}
.pr-r{font-family:'Space Mono',monospace;font-size:11px;color:var(--tx)}
/* GAME CANVAS */
.gc{flex:1;background:var(--bg);padding:10px;display:flex;flex-direction:column;gap:8px;overflow:auto;min-width:0}
/* HIST */
.hpanel{background:var(--card2);border:1px solid var(--b1);border-radius:8px;padding:8px 9px;flex-shrink:0}
.hp-title{font-size:9px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.hlist{display:flex;flex-direction:column;gap:2px;max-height:96px;overflow-y:auto}
.hi{display:flex;align-items:center;gap:5px;padding:3px 5px;background:var(--inp);border-radius:5px;font-size:10px}
.hb{width:13px;height:13px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;flex-shrink:0}
.hb.w{background:rgba(62,196,90,.2);color:var(--gh)}
.hb.l{background:rgba(239,68,68,.2);color:var(--redh)}
.hi-info{color:var(--mu2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:10px;flex-shrink:0}
.hi-amt.w{color:var(--gh)}.hi-amt.l{color:var(--redh)}
/* MINES GRID */
.mg-outer{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:240px}
.mg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:420px}
.mc{aspect-ratio:1;border-radius:8px;background:var(--card2);border:1.5px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .12s;position:relative;overflow:hidden;user-select:none}
.mc::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 55%);pointer-events:none}
.mc:hover:not(.open):not(.nc){background:var(--b2);border-color:var(--b3);transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.mc.gem{background:linear-gradient(135deg,#042818,#0a5235);border-color:#16a34a;box-shadow:0 0 10px rgba(22,163,74,.2);animation:cpop .22s cubic-bezier(.34,1.56,.64,1)}
.mc.mine{background:linear-gradient(135deg,#3a0808,#6b1111);border-color:var(--red);box-shadow:0 0 12px rgba(239,68,68,.3);animation:mpop .26s ease}
.mc.mine-g{background:#160505;border-color:#2a1010;opacity:.55}
.mc.safe-g{background:#041507;border-color:#0d3018;opacity:.45}
.mc.nc{cursor:not-allowed}
@keyframes cpop{0%{transform:scale(.65)}80%{transform:scale(1.09)}100%{transform:scale(1)}}
@keyframes mpop{0%{transform:scale(.8) rotate(-8deg)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.rov{display:none;position:absolute;inset:0;z-index:10;align-items:center;justify-content:center;flex-direction:column;gap:8px;border-radius:8px;backdrop-filter:blur(8px)}
.rov.show{display:flex}
.rov.wov{background:rgba(7,8,16,.82)}
.rov.lov{background:rgba(7,8,16,.88)}
.rot-w{font-size:20px;font-weight:900;color:var(--gh);letter-spacing:-1px}
.rot-l{font-size:20px;font-weight:900;color:var(--redh);letter-spacing:-1px}
.roa{font-family:'Space Mono',monospace;font-size:28px;font-weight:700}
.roa.w{color:var(--gh)}.roa.l{color:var(--redh)}
.rosub{font-size:11px;color:var(--mu2)}
.ro-again{background:var(--card);border:1px solid var(--b2);border-radius:7px;padding:6px 16px;font-size:11px;font-weight:600;color:var(--tx);cursor:pointer;font-family:'Inter',sans-serif;margin-top:2px}
.ro-again:hover{border-color:var(--green);color:var(--gh)}
/* CRASH */
.crash-bar{display:flex;gap:4px;overflow-x:auto;padding-bottom:1px;flex-shrink:0}
.crash-bar::-webkit-scrollbar{height:0}
.cpill{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;white-space:nowrap;flex-shrink:0}
.cpill.lo{background:rgba(99,102,241,.2);color:var(--blueh)}
.cpill.mid{background:rgba(245,166,35,.2);color:var(--goldh)}
.cpill.hi{background:rgba(239,68,68,.2);color:var(--redh)}
.crash-arena{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:200px;position:relative}
.crash-circle{width:84px;height:84px;border-radius:50%;border:2.5px solid var(--blue);display:flex;align-items:center;justify-content:center}
.crash-rocket{font-size:30px}
.crash-rocket.fly{animation:fly 1.2s ease-in-out infinite}
@keyframes fly{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-5px) rotate(-4deg)}}
.crash-mult{font-family:'Space Mono',monospace;font-size:40px;font-weight:700;color:#fff;letter-spacing:-2px;line-height:1;transition:color .3s}
.crash-mult.fly{color:var(--gh)}
.crash-mult.crash{color:var(--redh)}
.crash-status{font-size:11px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:2px}
.crash-status.fly{color:var(--gh)}
.crash-status.crash{color:var(--redh)}
.crash-players{background:var(--card2);border:1px solid var(--b1);border-radius:8px;padding:8px 9px;flex-shrink:0}
.cp-title{font-size:9px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.cp-list{display:flex;flex-direction:column;gap:2px;max-height:80px;overflow-y:auto}
.cp-item{display:flex;align-items:center;gap:5px;padding:3px 5px;background:var(--inp);border-radius:5px;font-size:10px}
.cp-ava{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;flex-shrink:0}
.cp-name{color:var(--mu2);flex:1}
.cp-bet{font-family:'Space Mono',monospace;font-size:9px;color:var(--tx)}
.cp-mult{font-family:'Space Mono',monospace;font-size:9px;font-weight:700}
.cp-mult.w{color:var(--gh)}.cp-mult.fly{color:var(--goldh)}
/* SLOTS */
.slots-outer{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.reels{background:var(--card2);border:2px solid var(--b2);border-radius:12px;padding:12px 16px;display:flex;gap:8px;position:relative;overflow:hidden}
.reels::after{content:'';position:absolute;left:0;right:0;top:50%;height:2px;margin-top:-1px;background:rgba(245,166,35,.18);z-index:4;pointer-events:none}
.reel{width:68px;height:204px;border-radius:7px;overflow:hidden;background:var(--card);border:1px solid var(--b2);position:relative;z-index:2}
.ri{display:flex;flex-direction:column;transition:none}
.rc{width:68px;height:68px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.rwl{height:2px;background:var(--gold);width:100%;opacity:0;margin-top:3px}
.rwl.on{opacity:1;animation:wla 1s ease infinite}
@keyframes wla{0%,100%{background:var(--gold)}50%{background:var(--goldh)}}
.slots-msg{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--mu);text-align:center;min-height:20px}
.slots-msg.w{color:var(--goldh)}.slots-msg.l{color:var(--redh)}
/* BLACKJACK */
.bj-area{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:10px 12px;gap:8px;min-height:260px;position:relative}
.bj-zone{display:flex;flex-direction:column;align-items:center;gap:5px}
.bj-lbl{font-size:9px;color:var(--mu2);text-transform:uppercase;letter-spacing:1px}
.bj-hand{display:flex;justify-content:center;min-height:90px;align-items:center}
.card{width:58px;height:84px;border-radius:6px;background:#fff;border:1px solid #ccc;display:flex;flex-direction:column;justify-content:space-between;padding:4px;box-shadow:0 4px 14px rgba(0,0,0,.5);flex-shrink:0;margin-left:-8px}
.card:first-child{margin-left:0}
.card.red{color:#dc2626}.card.blk{color:#111}
.card.hid{background:repeating-linear-gradient(135deg,#1a2040 0,#1a2040 4px,#222848 4px,#222848 8px);border-color:var(--b2)}
.ctop{font-size:10px;font-weight:700;display:flex;flex-direction:column;gap:1px}
.cmid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px}
.cbot{font-size:10px;font-weight:700;display:flex;flex-direction:column;gap:1px;transform:rotate(180deg);align-items:flex-start}
.bj-score{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gold)}
.bj-div{width:100%;height:1px;background:var(--b1)}
.bj-acts{display:flex;gap:5px;width:100%;max-width:260px}
.bja{flex:1;padding:8px 4px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .14s}
.bja:disabled{opacity:.25;cursor:not-allowed}
.bja.hit{background:var(--blue);color:#fff}
.bja.stand{background:var(--red);color:#fff}
.bja.dbl{background:var(--gold);color:#000}
/* DICE */
.dice-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:10px}
.dice-big{font-family:'Space Mono',monospace;font-size:54px;font-weight:700;color:#fff;letter-spacing:-3px;line-height:1}
.dice-big.w{color:var(--gh)}.dice-big.l{color:var(--redh)}
.dice-track{width:100%;max-width:380px}
.dt-bg{height:8px;border-radius:4px;background:var(--b1);position:relative;overflow:hidden;margin-bottom:14px}
.dt-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .4s}
.dt-fill.l{background:linear-gradient(90deg,var(--red),#ff8080)}
.dt-needle{width:2px;height:20px;background:#fff;border-radius:1px;position:absolute;top:-6px;transform:translateX(-50%);transition:left .4s cubic-bezier(.34,1.2,.64,1)}
.dt-needle::after{content:'▼';position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:8px;color:#fff}
.dt-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--mu2);font-family:'Space Mono',monospace}
.dice-stats{background:var(--card2);border:1px solid var(--b1);border-radius:8px;padding:7px 11px;display:flex;justify-content:space-between;width:100%;max-width:380px}
.ds-item{text-align:center}
.dsl{font-size:8px;color:var(--mu2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.dsv{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--tx)}
.dsv.g{color:var(--gh)}.dsv.go{color:var(--gold)}
/* PLINKO */
.plinko-outer{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px;min-height:0}
.plinko-wrap{position:relative;width:100%;max-width:500px;flex:1;min-height:260px}
#plCv{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
.pl-buckets{display:flex;gap:2px;width:100%;max-width:500px;flex-shrink:0}
.pb{flex:1;padding:4px 1px;border-radius:5px;text-align:center;font-size:8px;font-weight:700;font-family:'Space Mono',monospace;transition:transform .15s}
/* CHAT */
.chat{width:210px;background:var(--bg2);border-left:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0}
.chat-hd{padding:9px 11px 7px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-title{font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:4px}
.chat-online{font-size:9px;color:var(--gh);background:rgba(62,196,90,.12);padding:2px 6px;border-radius:10px}
.chat-msgs{flex:1;overflow-y:auto;padding:7px 9px;display:flex;flex-direction:column;gap:5px}
.cm{display:flex;flex-direction:column;gap:1px}
.cm-top{display:flex;align-items:center;gap:4px}
.cm-ava{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.cm-name{font-size:10px;font-weight:700;color:var(--tx)}
.cm-vip{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:700}
.cm-vip.bronze{background:rgba(180,100,30,.3);color:#cd7f32}
.cm-vip.silver{background:rgba(180,180,180,.2);color:#c0c0c0}
.cm-vip.gold{background:rgba(245,166,35,.2);color:var(--gold)}
.cm-vip.diamond{background:rgba(34,211,238,.15);color:var(--cyan)}
.cm-txt{font-size:10px;color:var(--mu2);line-height:1.4;padding-left:20px}
.chat-inp-wrap{padding:7px 9px;border-top:1px solid var(--b1);flex-shrink:0}
.chat-inp{width:100%;background:var(--inp);border:1px solid var(--b2);border-radius:7px;padding:6px 9px;font-size:11px;color:var(--tx);outline:none;font-family:'Inter',sans-serif}
.chat-inp:focus{border-color:var(--blue)}
.chat-inp::placeholder{color:var(--mu)}
/* PAGES */
.page{display:none;flex:1;overflow-y:auto;padding:18px;flex-direction:column;gap:14px}
.page.on{display:flex}
.pg-h{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.5px}
.pg-sub{font-size:11px;color:var(--mu2);margin-top:1px}
.prof-grid{display:grid;grid-template-columns:200px 1fr;gap:12px;align-items:start}
.prof-sb{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:12px;display:flex;flex-direction:column;gap:4px}
.prof-user{display:flex;align-items:center;gap:9px;padding-bottom:10px;border-bottom:1px solid var(--b1);margin-bottom:3px}
.prof-ava{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.prof-name{font-size:13px;font-weight:700;color:#fff}
.prof-email{font-size:9px;color:var(--mu2);margin-top:1px}
.pnb{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;color:var(--mu2);border:none;background:none;text-align:left;width:100%;transition:all .14s}
.pnb:hover{background:var(--card2);color:var(--tx)}
.pnb.on{background:var(--card2);color:var(--tx)}
.prof-content{display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:14px}
.pcard-h{font-size:11px;font-weight:700;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1)}
.irow:last-child{border-bottom:none}
.irow-l{font-size:11px;color:var(--mu2)}
.irow-r{font-size:11px;font-weight:600;color:var(--tx)}
.bal-big{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:#fff}
.bal-big em{color:var(--mu2);font-size:17px;font-style:normal}
.pact-row{display:flex;gap:6px;margin-top:8px}
.pact{flex:1;padding:8px;border:1px solid var(--b2);border-radius:7px;background:var(--card2);color:var(--tx);font-size:11px;font-weight:600;cursor:pointer;transition:all .14s;font-family:'Inter',sans-serif}
.pact:hover{border-color:var(--green);color:var(--gh)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sg{background:var(--card2);border:1px solid var(--b1);border-radius:8px;padding:9px;text-align:center}
.sg-l{font-size:8px;color:var(--mu2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.sg-v{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--tx)}
.sg-v.g{color:var(--gh)}.sg-v.r{color:var(--redh)}.sg-v.go{color:var(--gold)}.sg-v.b{color:var(--blueh)}
.gh-table{width:100%;border-collapse:collapse;font-size:10px}
.gh-table th{text-align:left;padding:6px 7px;color:var(--mu2);font-weight:600;font-size:8px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b1)}
.gh-table td{padding:7px 7px;border-bottom:1px solid var(--b1);color:var(--tx)}
.gh-table tr:last-child td{border-bottom:none}
.wtd{color:var(--gh);font-weight:700;font-family:'Space Mono',monospace}
.ltd{color:var(--redh);font-weight:700;font-family:'Space Mono',monospace}
/* VIP */
.vip-banner{background:linear-gradient(135deg,#110d30,#231660,#110d30);border:1px solid #3020a0;border-radius:11px;padding:16px 18px;display:flex;align-items:center;gap:12px}
.vb-l .vbs{font-size:9px;color:#9d8ce8;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.vb-l .vbt{font-size:18px;font-weight:800;color:#fff}
.vb-mid{flex:1}
.xp-row{display:flex;justify-content:space-between;margin-bottom:5px}
.xp-lbl{font-size:10px;color:#9d8ce8}
.xp-num{font-size:10px;color:#9d8ce8;font-family:'Space Mono',monospace}
.xp-bg{height:9px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
.xp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .8s cubic-bezier(.34,1.2,.64,1)}
.xp-next{font-size:9px;color:#9d8ce8;margin-top:4px}
.vb-badge{background:linear-gradient(135deg,var(--gold),#c87800);border-radius:7px;padding:6px 14px;font-size:11px;font-weight:800;color:#000;flex-shrink:0}
.tier-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tc{border:1px solid var(--b1);border-radius:9px;padding:10px;text-align:center;transition:all .2s}
.tc.on{border-color:var(--gold);background:rgba(245,166,35,.07)}
.tc-ico{font-size:20px;margin-bottom:4px}
.tc-name{font-size:10px;font-weight:700;color:var(--tx)}
.tc-req{font-size:8px;color:var(--mu2);margin-top:1px}
.tc-bonus{font-size:9px;color:var(--gold);margin-top:3px;font-weight:600}
.perks{display:flex;flex-direction:column;gap:5px}
.perk{display:flex;align-items:center;gap:8px;padding:8px 9px;background:var(--card2);border-radius:7px}
.perk-ico{font-size:14px;flex-shrink:0}
.pi-t{font-size:11px;font-weight:600;color:var(--tx)}
.pi-s{font-size:9px;color:var(--mu2);margin-top:1px}
.perk-val{margin-left:auto;font-size:10px;font-weight:700;color:var(--gh)}
/* BONUSES */
.bonus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px}
.bcard{background:var(--card);border:1px solid var(--b1);border-radius:11px;overflow:hidden}
.bcard-hd{padding:12px 12px 10px;background:var(--card2)}
.bc-tag{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:20px;display:inline-block;margin-bottom:5px}
.bc-tag.new{background:rgba(62,196,90,.2);color:var(--gh)}
.bc-tag.hot{background:rgba(239,68,68,.2);color:var(--redh)}
.bc-tag.vip{background:rgba(245,166,35,.2);color:var(--gold)}
.bc-tag.ex{background:rgba(147,51,234,.2);color:#c084fc}
.bcard-title{font-size:13px;font-weight:800;color:#fff}
.bcard-desc{font-size:10px;color:var(--mu2);margin-top:3px;line-height:1.4}
.bcard-body{padding:10px 12px}
.bc-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--gold);margin-bottom:6px}
.bc-btn{width:100%;padding:8px;background:var(--green);color:#000;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .14s}
.bc-btn:hover{background:var(--gh)}
.bc-btn.claimed{background:var(--card2);color:var(--mu2);border:1px solid var(--b2);cursor:default}
.promo-row{display:flex;gap:5px;margin-bottom:6px}
.promo-inp{flex:1;background:var(--inp);border:1.5px solid var(--b2);border-radius:7px;padding:6px 8px;font-size:11px;color:var(--tx);outline:none;font-family:'Space Mono',monospace}
.promo-inp:focus{border-color:var(--green)}
.promo-apply{background:var(--gold);color:#000;border:none;border-radius:7px;padding:6px 10px;font-size:10px;font-weight:700;cursor:pointer}
/* MODALS */
.mod-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px)}
.mod-ov.show{display:flex}
@media(min-width:600px){.mod-ov{align-items:center}}
.mod-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.7);animation:mup .28s cubic-bezier(.34,1.1,.64,1);display:flex;flex-direction:column}
@media(min-width:600px){.mod-sheet{border-radius:14px;animation:none}}
@keyframes mup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mod-handle{width:32px;height:3px;background:var(--b2);border-radius:2px;margin:8px auto 0;flex-shrink:0}
.mod-head{padding:11px 15px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.mod-title{font-size:14px;font-weight:700}
.mod-sub{font-size:10px;color:var(--mu2);margin-top:1px}
.mod-x{background:var(--card2);border:1px solid var(--b2);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu2);font-size:13px;transition:all .14s;flex-shrink:0}
.mod-x:hover{color:var(--tx)}
.mod-body{padding:11px 15px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
.mstep{display:none;flex-direction:column;gap:9px}
.mstep.on{display:flex}
.amt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ag{background:var(--card2);border:1.5px solid var(--b1);border-radius:8px;padding:8px 5px;text-align:center;cursor:pointer;transition:all .14s}
.ag:hover{border-color:var(--b2)}
.ag.sel{border-color:var(--green);background:rgba(62,196,90,.07)}
.ag-v{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--tx);display:block}
.ag-s{font-size:8px;color:var(--mu2);margin-top:1px}
.cust-wrap{display:flex;gap:6px}
.cust-wrap input{flex:1;background:var(--inp);border:1.5px solid var(--b2);border-radius:7px;padding:7px 9px;font-family:'Space Mono',monospace;font-size:12px;color:var(--tx);outline:none}
.cust-wrap input:focus{border-color:var(--green)}
.meths{display:flex;flex-direction:column;gap:4px}
.meth{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--card2);border:1.5px solid var(--b1);border-radius:9px;cursor:pointer;transition:all .14s}
.meth:hover{border-color:var(--b2)}
.meth.sel{border-color:var(--green);background:rgba(62,196,90,.06)}
.meth-ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.meth-mn{font-size:12px;font-weight:600;color:var(--tx)}
.meth-ms{font-size:9px;color:var(--mu2);margin-top:1px}
.meth-chk{margin-left:auto;width:16px;height:16px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;transition:all .14s;flex-shrink:0}
.meth.sel .meth-chk{border-color:var(--green);background:var(--green);color:#000}
.card-form{display:flex;flex-direction:column;gap:5px}
.cf-i{width:100%;background:var(--inp);border:1.5px solid var(--b2);border-radius:7px;padding:7px 9px;font-family:'Space Mono',monospace;font-size:12px;color:var(--tx);outline:none}
.cf-i:focus{border-color:var(--green)}
.cf-i::placeholder{color:var(--mu)}
.cf-r{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.crypto-note{font-size:9px;color:var(--mu2);line-height:1.5;background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.2);border-radius:6px;padding:7px 9px}
.mnav{display:flex;gap:6px}
.mnext{flex:1;padding:10px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.mnext:hover{background:var(--gh)}
.mback{padding:10px 12px;background:var(--card2);border:1px solid var(--b1);border-radius:8px;font-size:11px;font-weight:600;color:var(--mu2);cursor:pointer;font-family:'Inter',sans-serif}
.mback:hover{color:var(--tx)}
.msec{font-size:9px;color:var(--mu);text-align:center;display:flex;align-items:center;justify-content:center;gap:3px}
.proc-c{display:flex;flex-direction:column;align-items:center;gap:9px;padding:16px 0 4px}
.proc-spin{width:44px;height:44px;border-radius:50%;border:3px solid var(--b2);border-top-color:var(--green);animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-t{font-size:12px;font-weight:600;color:var(--tx)}
.proc-s{font-size:10px;color:var(--mu2);text-align:center}
.ap-ui{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 0}
.ap-logo{background:#000;border-radius:10px;padding:10px 22px}
.ap-logo span{color:#fff;font-size:15px;font-weight:600;font-family:'Inter',sans-serif}
.pdots{display:flex;gap:5px}
.pd{width:7px;height:7px;border-radius:50%;background:var(--b2);animation:pda .9s ease infinite}
.pd:nth-child(2){animation-delay:.2s}.pd:nth-child(3){animation-delay:.4s}
@keyframes pda{0%,100%{background:var(--b2);transform:scale(1)}50%{background:var(--green);transform:scale(1.3)}}
.succ-c{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 0 4px}
.succ-ring{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--green),#267a36);display:flex;align-items:center;justify-content:center;font-size:22px;animation:rpop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes rpop{0%{transform:scale(0)}100%{transform:scale(1)}}
.succ-t{font-size:15px;font-weight:700}
.succ-a{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--gh)}
.succ-s{font-size:10px;color:var(--mu2);text-align:center}
.succ-tx{background:var(--inp);border:1px solid var(--b2);border-radius:6px;padding:5px 9px;font-size:9px;color:var(--mu2);text-align:center;width:100%}
.succ-done{width:100%;padding:10px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.succ-done:hover{background:var(--gh)}
/* PIN */
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.pin-ov.show{display:flex}
.pin-box{background:var(--card);border:1px solid var(--b2);border-radius:14px;padding:22px 20px;width:280px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.pin-ico{width:46px;height:46px;border-radius:12px;background:var(--card2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:20px}
.pin-title{font-size:14px;font-weight:700;color:#fff}
.pin-sub{font-size:10px;color:var(--mu2);text-align:center}
.pin-dots{display:flex;gap:8px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--b2);transition:background .14s}
.pin-dot.f{background:var(--blue)}.pin-dot.ok{background:var(--green)}.pin-dot.err{background:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%}
.pp{background:var(--card2);border:1px solid var(--b2);border-radius:8px;padding:11px;font-size:16px;font-weight:600;color:var(--tx);cursor:pointer;text-align:center;transition:all .13s;font-family:'Space Mono',monospace}
.pp:hover{background:var(--b2);color:#fff}
.pp:active{transform:scale(.96)}
.pp.del{font-size:12px;color:var(--mu2)}
.pin-err{font-size:10px;color:var(--red);min-height:14px;text-align:center}
/* CHEAT */
.cheat-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.cheat-ov.show{display:flex}
.cheat-box{background:var(--card);border:1px solid #3d2fa0;border-radius:14px;width:340px;max-width:94vw;max-height:86vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.cheat-hd{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:2}
.cheat-title{font-size:13px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px}
.cheat-badge{font-size:8px;background:rgba(147,51,234,.3);color:#c084fc;padding:2px 6px;border-radius:20px;font-weight:700}
.cheat-xb{background:var(--card2);border:1px solid var(--b2);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu2);font-size:12px}
.cheat-xb:hover{color:var(--tx)}
.cheat-body{padding:12px 16px 16px;display:flex;flex-direction:column;gap:10px}
.cs-sect{display:flex;flex-direction:column;gap:6px}
.cs-sect-t{font-size:8px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#9d8ce8;padding-bottom:3px;border-bottom:1px solid var(--b1)}
.cs-row{display:flex;align-items:center;justify-content:space-between;gap:9px}
.cs-lbl{font-size:11px;color:var(--tx);font-weight:500}
.cs-sub{font-size:9px;color:var(--mu2)}
.tog{position:relative;width:38px;height:20px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-t{position:absolute;inset:0;background:var(--b2);border-radius:10px;cursor:pointer;transition:background .2s}
.tog input:checked+.tog-t{background:var(--purple)}
.tog-t::after{content:'';position:absolute;left:3px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog input:checked+.tog-t::after{transform:translateX(18px)}
.cs-sw{width:100px;display:flex;flex-direction:column;gap:2px;align-items:flex-end}
.cs-slide{width:100px;appearance:none;height:3px;background:var(--b2);border-radius:2px;outline:none;cursor:pointer}
.cs-slide::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--purple);cursor:pointer;border:2px solid var(--bg)}
.cs-v{font-family:'Space Mono',monospace;font-size:10px;color:#c084fc;font-weight:700;text-align:right}
.cs-br{display:flex;gap:4px}
.cs-inp{flex:1;background:var(--inp);border:1.5px solid var(--b2);border-radius:6px;padding:6px 8px;font-family:'Space Mono',monospace;font-size:11px;color:var(--tx);outline:none}
.cs-inp:focus{border-color:var(--purple)}

  // Dark casino login/register modal
  function showAuthModal() {
    const modal = document.createElement('div');
    modal.id = 'authModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:#161828;width:380px;border-radius:16px;padding:32px 28px;border:1px solid #272c4a;color:#dde1f5;box-shadow:0 20px 80px rgba(0,0,0,0.8);">
        <div style="text-align:center;margin-bottom:24px;">
          <div style="font-size:32px;font-weight:900;letter-spacing:-1.5px;color:#fff;">VAULTBET</div>
          <div id="authTitle" style="font-size:19px;margin-top:12px;color:#fff;">Create Account</div>
        </div>
        <input id="authEmail" type="email" placeholder="Email" style="width:100%;background:#10111e;border:1.5px solid #272c4a;border-radius:8px;padding:14px;margin-bottom:12px;color:#fff;font-size:15px;">
        <input id="authPass" type="password" placeholder="Password (min 6 chars)" style="width:100%;background:#10111e;border:1.5px solid #272c4a;border-radius:8px;padding:14px;margin-bottom:12px;color:#fff;font-size:15px;">
        <input id="authUsername" type="text" placeholder="Username (optional)" style="width:100%;background:#10111e;border:1.5px solid #272c4a;border-radius:8px;padding:14px;margin-bottom:20px;color:#fff;font-size:15px;">
        <button id="authSubmit" style="width:100%;background:#3ec45a;color:#000;font-weight:700;padding:14px;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Register</button>
        <div id="authToggle" style="text-align:center;margin-top:20px;color:#6870a0;cursor:pointer;font-size:14px;">Already have an account? Login</div>
        <div id="authMsg" style="margin-top:16px;text-align:center;font-size:13px;min-height:22px;color:#ef4444;"></div>
        <div onclick="hideAuthModal()" style="position:absolute;top:16px;right:20px;color:#6870a0;cursor:pointer;font-size:26px;">×</div>
      </div>
    `;
    document.body.appendChild(modal);

    let isRegister = true;
    const titleEl = document.getElementById('authTitle');
    const submitEl = document.getElementById('authSubmit');
    const toggleEl = document.getElementById('authToggle');
    const msgEl = document.getElementById('authMsg');

    toggleEl.addEventListener('click', () => {
      isRegister = !isRegister;
      titleEl.textContent = isRegister ? 'Create Account' : 'Login';
      submitEl.textContent = isRegister ? 'Register' : 'Login';
      toggleEl.textContent = isRegister ? 'Already have an account? Login' : "Don't have an account? Register";
    });

    submitEl.addEventListener('click', async () => {
      const email = document.getElementById('authEmail').value.trim();
      const pass = document.getElementById('authPass').value;
      let username = document.getElementById('authUsername').value.trim() || email.split('@')[0];

      if (!email || !pass) {
        msgEl.textContent = 'Email and password required';
        return;
      }
      if (pass.length < 6) {
        msgEl.textContent = 'Password must be at least 6 characters';
        return;
      }

      try {
        if (isRegister) {
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          const user = cred.user;
          await updateProfile(user, { displayName: username });

          await setDoc(doc(db, "users", user.uid), {
            username: username,
            email: email,
            balance: 1000,
            xp: 0,
            totalWag: 0,
            totalRB: 0,
            gameHist: [],
            createdAt: new Date().toISOString()
          });
        } else {
          await signInWithEmailAndPassword(auth, email, pass);
        }
        hideAuthModal();
      } catch (err) {
        msgEl.textContent = err.message.replace('Firebase: ', '');
      }
    });
  }

  window.hideAuthModal = () => {
    const m = document.getElementById('authModal');
    if (m) m.remove();
  };

  function loadUserData(uid) {
    userDocRef = doc(db, "users", uid);
    onSnapshot(userDocRef, (snap) => {
      if (snap.exists()) {
        const d = snap.data();
        bal = d.balance || 1000;
        xp = d.xp || 0;
        totalWag = d.totalWag || 0;
        totalRB = d.totalRB || 0;
        gameHist = d.gameHist || [];
        updBal();
        updVIP();
        updBonuses();
        if (typeof renderProf === 'function') renderProf('main');
      }
    });
  }

  async function saveUserData() {
    if (!userDocRef) return;
    try {
      await setDoc(userDocRef, {
        balance: bal,
        xp: xp,
        totalWag: totalWag,
        totalRB: totalRB,
        gameHist: gameHist.slice(0, 80)
      }, { merge: true });
    } catch (e) {}
  }

  // Override updBal
  const origUpdBal = typeof updBal === 'function' ? updBal : () => {};
  window.updBal = function() {
    origUpdBal();
    saveUserData();
  };

  window.logout = async () => {
    await signOut(auth);
    location.reload();
  };

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      loadUserData(user.uid);
    } else {
      setTimeout(showAuthModal, 600);
